<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpeedSlicer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <div class="header-brand">
        <svg class="logo-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M4 4h6v6H4z"/><path d="M14 4h6v6h-6z"/><path d="M4 14h6v6H4z"/><path d="M17 14v7"/><path d="M14 17h7"/></svg>
        <h1>SpeedSlicer</h1>
      </div>
      <div class="header-actions">
        <button id="load-new-image-btn" class="btn-ghost" data-i18n="loadNewImage"></button>
        <select id="lang-select"></select>
      </div>
    </header>

    <div id="main">
      <!-- Left: Element list panel -->
      <div id="elements-panel">
        <div class="panel-title-bar">
          <h3><span data-i18n="elementList"></span> <span class="badge" id="element-count">0</span></h3>
          <div class="element-list-actions">
            <button id="add-box-btn" class="tool-btn" data-i18n-title="addBoxTitle">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
            </button>
            <button id="merge-selected-btn" class="tool-btn" data-i18n-title="mergeSelectedTitle" disabled>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M3 8h7V3"/><path d="M21 16h-7v5"/><path d="M10 3L3 8"/><path d="M14 21l7-5"/></svg>
            </button>
            <button id="delete-selected-btn" class="tool-btn" data-i18n-title="deleteTitle">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
            </button>
          </div>
        </div>
        <div id="element-list"></div>
      </div>

      <!-- Center: Canvas area -->
      <div id="canvas-area">
        <div id="drop-zone">
          <div class="drop-zone-inner">
            <svg class="drop-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
            <p data-i18n="dropZone"></p>
          </div>
          <input type="file" id="file-input" accept="image/*" />
        </div>
        <canvas id="preview-canvas"></canvas>
        <div id="canvas-controls">
          <span id="zoom-level">100%</span>
        </div>
      </div>

      <!-- Right: Settings panel -->
      <div id="panel">
        <div id="settings-section" class="panel-section">
          <h3 data-i18n="settings"></h3>

          <div class="control-group">
            <label data-i18n="bgColor"></label>
            <div id="bg-color-row">
              <div id="bg-color-swatch"></div>
              <input type="color" id="bg-color-picker" value="#00ff00" />
              <button id="bg-eyedropper-btn" class="tool-btn" data-i18n-title="eyedropperTitle">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M2 22l1-1h3l9-9"/><path d="M13 6l3.5-3.5a2.12 2.12 0 013 3L16 9"/><path d="M10 9l5 5"/></svg>
              </button>
            </div>
          </div>

          <div class="control-group">
            <label data-i18n="keyingMode"></label>
            <div id="mode-toggle">
              <button id="mode-gradient" class="mode-btn" data-i18n="modeGradient"></button>
              <button id="mode-threshold" class="mode-btn active" data-i18n="modeThreshold"></button>
            </div>
          </div>

          <div id="gradient-params" class="param-group" style="display:none;">
            <div class="control-group">
              <label data-i18n-label="innerHue" data-i18n-suffix="°"><span id="inner-hue-val">15</span>°</label>
              <input type="range" id="inner-hue" min="1" max="90" value="15" />
            </div>
            <div class="control-group">
              <label data-i18n-label="outerHue" data-i18n-suffix="°"><span id="outer-hue-val">40</span>°</label>
              <input type="range" id="outer-hue" min="5" max="120" value="40" />
            </div>
            <div class="control-group">
              <label data-i18n-label="satProtect" data-i18n-suffix="%"><span id="sat-thresh-val">15</span>%</label>
              <input type="range" id="sat-threshold" min="0" max="50" value="15" />
            </div>
            <div class="control-group">
              <label data-i18n-label="valProtect" data-i18n-suffix="%"><span id="val-thresh-val">10</span>%</label>
              <input type="range" id="val-threshold" min="0" max="50" value="10" />
            </div>
            <div class="control-group">
              <label data-i18n-label="despillStrength" data-i18n-suffix="%"><span id="despill-val">100</span>%</label>
              <input type="range" id="despill-strength" min="0" max="100" value="100" />
            </div>
            <div class="control-group">
              <label data-i18n-label="antiAlias" data-i18n-suffix="px"><span id="gradient-aa-val">3</span>px</label>
              <input type="range" id="gradient-aa-dist" min="0" max="5" value="3" />
            </div>
          </div>

          <div id="threshold-params" class="param-group">
            <div class="control-group">
              <label data-i18n-label="thresholdVal"><span id="thresh-val">158</span></label>
              <input type="range" id="threshold-value" min="0" max="255" value="158" />
            </div>
            <div class="control-group">
              <label data-i18n-label="antiAlias" data-i18n-suffix="px"><span id="thresh-aa-val">2</span>px</label>
              <input type="range" id="thresh-aa-dist" min="0" max="5" value="2" />
            </div>
          </div>

          <div class="control-group">
            <label data-i18n-label="minElementSize" data-i18n-suffix="px"><span id="min-size-val">34</span>px</label>
            <input type="range" id="min-element-size" min="1" max="100" value="34" />
          </div>
          <div class="control-group">
            <label data-i18n-label="overlapDist" data-i18n-suffix="px"><span id="overlap-dist-val">13</span>px</label>
            <input type="range" id="overlap-distance" min="0" max="50" value="13" />
          </div>

          <button id="recalculate-btn" class="btn-accent" disabled data-i18n="recalculate"></button>

          <div class="config-actions">
            <button id="save-config-btn" class="btn-subtle" data-i18n="saveConfig"></button>
            <button id="load-config-btn" class="btn-subtle" data-i18n="loadConfig"></button>
            <input type="file" id="config-file-input" accept=".json" style="display:none;" />
          </div>
        </div>
      </div>
    </div>

    <footer id="export-bar">
      <div class="control-group export-padding">
        <label data-i18n-label="padding" data-i18n-suffix="px"><span id="padding-val">5</span>px</label>
        <input type="range" id="export-padding" min="0" max="20" value="5" />
      </div>
      <button id="export-all" class="btn-export" disabled data-i18n="exportAll"></button>
    </footer>
  </div>

  <script src="lib/jszip.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
