<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpeedSlicer</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- Top bar -->
    <header id="header">
      <h1>SpeedSlicer</h1>
      <button id="load-new-image-btn" class="btn-secondary header-btn" data-i18n="loadNewImage"></button>
      <div id="lang-group">
        <select id="lang-select"></select>
      </div>
    </header>

    <div id="main">
      <!-- Left: Element list panel -->
      <div id="elements-panel">
        <div class="element-list-header">
          <h3><span data-i18n="elementList"></span> (<span id="element-count">0</span>)</h3>
          <div class="element-list-actions">
            <button id="add-box-btn" class="icon-btn" data-i18n-title="addBoxTitle">+</button>
            <button id="merge-selected-btn" class="icon-btn" data-i18n-title="mergeSelectedTitle" disabled>⊞</button>
            <button id="delete-selected-btn" class="icon-btn" data-i18n-title="deleteTitle">🗑</button>
          </div>
        </div>
        <div id="element-list"></div>
      </div>

      <!-- Center: Canvas area -->
      <div id="canvas-area">
        <div id="drop-zone">
          <p data-i18n="dropZone"></p>
          <input type="file" id="file-input" accept="image/*" />
        </div>
        <canvas id="preview-canvas"></canvas>
        <div id="canvas-controls">
          <span id="zoom-level">100%</span>
        </div>
      </div>

      <!-- Right: Settings panel -->
      <div id="panel">
        <div id="settings-section" class="panel-section">
          <h3 data-i18n="settings"></h3>

          <!-- Background color -->
          <div class="control-group">
            <label data-i18n="bgColor"></label>
            <div id="bg-color-row">
              <div id="bg-color-swatch"></div>
              <input type="color" id="bg-color-picker" value="#00ff00" />
              <button id="bg-eyedropper-btn" data-i18n-title="eyedropperTitle">🎯</button>
            </div>
          </div>

          <!-- Mode toggle -->
          <div class="control-group">
            <label data-i18n="keyingMode"></label>
            <div id="mode-toggle">
              <button id="mode-gradient" class="mode-btn active" data-i18n="modeGradient"></button>
              <button id="mode-threshold" class="mode-btn" data-i18n="modeThreshold"></button>
            </div>
          </div>

          <!-- Gradient mode params (HSV keying) -->
          <div id="gradient-params" class="param-group">
            <div class="control-group">
              <label data-i18n-label="innerHue" data-i18n-suffix="°"><span id="inner-hue-val">15</span>°</label>
              <input type="range" id="inner-hue" min="1" max="90" value="15" />
            </div>
            <div class="control-group">
              <label data-i18n-label="outerHue" data-i18n-suffix="°"><span id="outer-hue-val">40</span>°</label>
              <input type="range" id="outer-hue" min="5" max="120" value="40" />
            </div>
            <div class="control-group">
              <label data-i18n-label="satProtect" data-i18n-suffix="%"><span id="sat-thresh-val">15</span>%</label>
              <input type="range" id="sat-threshold" min="0" max="50" value="15" />
            </div>
            <div class="control-group">
              <label data-i18n-label="valProtect" data-i18n-suffix="%"><span id="val-thresh-val">10</span>%</label>
              <input type="range" id="val-threshold" min="0" max="50" value="10" />
            </div>
            <div class="control-group">
              <label data-i18n-label="despillStrength" data-i18n-suffix="%"><span id="despill-val">100</span>%</label>
              <input type="range" id="despill-strength" min="0" max="100" value="100" />
            </div>
            <div class="control-group">
              <label data-i18n-label="antiAlias" data-i18n-suffix="px"><span id="gradient-aa-val">3</span>px</label>
              <input type="range" id="gradient-aa-dist" min="0" max="5" value="3" />
            </div>
          </div>

          <!-- Threshold mode params -->
          <div id="threshold-params" class="param-group" style="display:none;">
            <div class="control-group">
              <label data-i18n-label="thresholdVal"><span id="thresh-val">50</span></label>
              <input type="range" id="threshold-value" min="0" max="255" value="50" />
            </div>
            <div class="control-group">
              <label data-i18n-label="antiAlias" data-i18n-suffix="px"><span id="thresh-aa-val">1</span>px</label>
              <input type="range" id="thresh-aa-dist" min="0" max="5" value="1" />
            </div>
          </div>

          <!-- Element detection params -->
          <div class="control-group">
            <label data-i18n-label="minElementSize" data-i18n-suffix="px"><span id="min-size-val">15</span>px</label>
            <input type="range" id="min-element-size" min="1" max="100" value="15" />
          </div>
          <div class="control-group">
            <label data-i18n-label="overlapDist" data-i18n-suffix="px"><span id="overlap-dist-val">12</span>px</label>
            <input type="range" id="overlap-distance" min="0" max="50" value="12" />
          </div>

          <button id="recalculate-btn" class="btn-primary" style="width:100%;margin-top:4px;" disabled data-i18n="recalculate"></button>

          <div class="config-actions">
            <button id="save-config-btn" class="btn-secondary config-btn" data-i18n="saveConfig"></button>
            <button id="load-config-btn" class="btn-secondary config-btn" data-i18n="loadConfig"></button>
            <input type="file" id="config-file-input" accept=".json" style="display:none;" />
          </div>
        </div>
      </div>
    </div>

    <!-- Bottom: Export bar -->
    <footer id="export-bar">
      <div class="control-group export-padding">
        <label data-i18n-label="padding" data-i18n-suffix="px"><span id="padding-val">5</span>px</label>
        <input type="range" id="export-padding" min="0" max="20" value="5" />
      </div>
      <button id="export-all" class="btn-primary" disabled data-i18n="exportAll"></button>
    </footer>
  </div>

  <script src="lib/jszip.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
